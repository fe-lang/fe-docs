<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fe {{VERSION}} — API Reference</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../fe-highlight.css">
</head>
<body>
  <script src="../fe-web.js"></script>
  <fe-doc-viewer title="Fe {{VERSION}} Standard Library" src="docs.json"
    routing="hash" show-search back-href="../" back-label="All Versions"></fe-doc-viewer>
  <script>
    // Version picker — injected into the viewer header after it renders
    fetch("../versions.json")
      .then(function(r) { return r.json(); })
      .then(function(v) {
        if (!v.versions || v.versions.length < 2) return;
        var current = location.pathname.replace(/\//g, "");
        var picker = document.createElement("select");
        picker.className = "version-picker";
        picker.style.cssText = "margin-left:12px;padding:2px 6px;background:#1a1f2e;color:#e4e4e4;border:1px solid #2d3748;border-radius:4px;font-size:0.85rem;cursor:pointer;";
        for (var i = 0; i < v.versions.length; i++) {
          var opt = document.createElement("option");
          opt.value = v.versions[i];
          opt.textContent = "v" + v.versions[i];
          if (v.versions[i] === current) opt.selected = true;
          picker.appendChild(opt);
        }
        picker.addEventListener("change", function() {
          location.href = "../" + this.value + "/" + location.hash;
        });
        // Wait for viewer to render, then inject (give up after 5s)
        var retries = 0;
        function inject() {
          var header = document.querySelector("fe-doc-viewer");
          if (header && header.shadowRoot) {
            var title = header.shadowRoot.querySelector(".fe-doc-viewer-title");
            if (title) { title.parentNode.insertBefore(picker, title.nextSibling); return; }
          }
          if (++retries < 50) setTimeout(inject, 100);
        }
        inject();
      });
  </script>
</body>
</html>
