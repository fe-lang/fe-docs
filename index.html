<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fe API Documentation</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="fe-highlight.css">
</head>
<body>
  <script src="fe-web.js"></script>
  <script>
    // Load the latest version's docs.json and render it here.
    // Hash fragments (e.g. #core::result::Result/enum) are preserved
    // because no redirect occurs — the viewer loads in place.
    fetch("versions.json")
      .then(function(r) { return r.json(); })
      .then(function(v) {
        if (!v.latest) return;
        var viewer = document.querySelector("fe-doc-viewer");
        viewer.setAttribute("src", v.latest + "/docs.json");
        viewer.setAttribute("title", "Fe " + v.latest + " Standard Library");
      });
  </script>
  <fe-doc-viewer title="Fe Standard Library" routing="hash" show-search></fe-doc-viewer>
</body>
</html>
